name: Publish

# Publishes all three packages to NuGet.org in lockstep via NuGet Trusted
# Publishing (OIDC) — no long-lived API key. Requires a trusted-publishing
# policy on nuget.org for owner `jadeoni`, repo `Escherbridge/surrealforge`,
# workflow file `publish.yml`.
# Trigger by publishing a GitHub Release (tag like v0.1.0), or manually.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write   # required for the OIDC token exchange
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore SurrealForge.slnx

      - name: Build
        run: dotnet build SurrealForge.slnx -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/SurrealForge.Client/SurrealForge.Client.csproj     -c Release --no-build -o artifacts
          dotnet pack src/SurrealForge.Schema/SurrealForge.Schema.csproj     -c Release --no-build -o artifacts
          dotnet pack src/SurrealForge.Analyzer/SurrealForge.Analyzer.csproj -c Release --no-build -o artifacts

      # Exchanges the GitHub OIDC token for a short-lived NuGet API key.
      - name: NuGet trusted-publishing login
        uses: NuGet/login@v1
        id: login
        with:
          user: jadeoni

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
